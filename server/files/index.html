<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        body{
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            
        }
        img:hover{
            box-shadow: 0 8px 18px rgba(23,25, 179, 0.50);
            
            transition: 0.2s;
        }
        img{
            border-radius: 2.2rem;
            
            max-width: 100%;
        }
        h1{
            font-weight: bold;
            margin: 0.8rem;
        }
        h1:hover{
            color: whitesmoke;
        }
        p{
            margin-left: 0.8rem;
        }
        article{
            background-color: rgb(194, 194, 194);
            border-radius: 2rem;
            margin-top: 1rem;
            padding: 1rem;
            box-shadow: 20px;
        }
        span{
            margin-left: 0.8rem;
            border-radius: 1rem;
            background-color: rgb(92, 92, 92);
            color: whitesmoke;
        }
    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body */ 
                    const movies=JSON.parse(xhr.responseText);
                    movies.forEach(function(movie){
                        const article=document.createElement("article");
                        const title=document.createElement("h1");
                        const space=document.createElement("br");
                        title.textContent="Title: "+movie.Title;
                        const poster=document.createElement("img");
                        poster.src=movie.Poster;
                        poster.alt=movie.Title+" Poster";
                        const released=document.createElement("p");
                        released.textContent="Released: "+movie.Released;
                        const runtime=document.createElement("p");
                        runtime.textContent="Runtime: "+movie.Runtime;
                        const genres=document.createElement("span");
                        genres.textContent="Genres: "+movie.Genres+" ";
                        const dir=document.createElement("h1");
                        dir.textContent='Directors: ';
                        const writers=document.createElement("h1");
                        const directorList=document.createElement("ul");
                        movie.Directors.forEach(function(director){
                            const li=document.createElement("li");
                            li.textContent=director;
                            directorList.append(li);
                        });
                        writers.textContent="Writers: ";
                        const writerList=document.createElement("ul");
                        movie.Writers.forEach(function (writer){
                            const l=document.createElement("li");
                            l.textContent=writer;
                            writerList.append(l);
                        });
                        const actor_title=document.createElement("h1");
                        actor_title.textContent="Actors: ";
                        //
                        const actorList=document.createElement("ul");
                        movie.Actors.forEach(function(actor){
                            const l=document.createElement("li");
                            l.textContent=actor;
                            actorList.append(l);
                        });
                        const plot=document.createElement("p");
                        plot.textContent=movie.Plot;
                        const imdbRating=document.createElement("p");
                        const metaScore=document.createElement("p");
                        metaScore.textContent="Metascore: "+movie.Metascore;
                        imdbRating.textContent="IMDB Rating: "+movie.imdbRating;
                        
                        article.append(poster);
                        
                        article.append(title);
                        
                        article.append(runtime);
                        article.append(released);
                        article.append(genres);
                        article.append(plot);
                        article.append(dir);
                        article.append(directorList);
                        
                        article.append(writers);
                        article.append(writerList);
                        article.append(actor_title);
                        article.append(actorList);
                        article.append(metaScore);
                        article.append(imdbRating);
                        bodyElement.append(article);
                        bodyElement.append(space);
                    })  
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
